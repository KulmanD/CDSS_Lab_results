name: MVP validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend tests and evaluation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests

      - name: Run MVP evaluation
        run: python evaluation.py --data ../data/evaluation/mvp_cases.json --min-f1 1.0

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
